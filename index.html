<!doctype html>
<html lang="en">
  <head>

    <meta name="theme-color" content="#0a0a0a" />

    <title>WEARD Management | Diverse Creators, Asian Influencers & Cultural Campaign Talent</title>

      name="description"
      content="WEARD Management helps brands hire diverse creators, Asian influencers, and multicultural talent for premium campaigns across the UK and Asia, including Lunar New Year, Ramadan, Diwali, and Mid-Autumn activations."

      name="keywords"

    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:title" content="WEARD Management | Diverse Creators, Asian Influencers & Cultural Campaign Talent" />
    <meta
      property="og:description"
      content="Hire diverse creators, Asian influencers, and multicultural talent for premium UK-Asia campaigns, including culturally-led seasonal activations."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://weardmgmt.com/" />
    <meta property="og:image" content="https://weardmgmt.com/og-image.jpg" />
    <meta property="og:image:alt" content="WEARD Management brand banner" />
    <meta property="og:site_name" content="WEARD Management" />
    <meta property="og:locale" content="en_GB" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WEARD Management | Diverse Creators, Asian Influencers & Cultural Campaign Talent" />

      name="twitter:description"
      content="Hire diverse creators, Asian influencers, and multicultural talent for premium UK-Asia campaigns and key cultural moments."

    <meta name="twitter:image:alt" content="WEARD Management brand banner" />
    <meta name="twitter:site" content="@weardmgmt" />

    <script>
      (function (location) {
        if (location.search[1] === "/") {
          var decoded = location.search
            .slice(1)
            .split("&")
            .map(function (segment) {
              return segment.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, "", decoded + location.hash);
        }
      })(window.location);
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "WEARD Management",
            "url": "https://weardmgmt.com/",
            "logo": "https://weardmgmt.com/og-image.jpg",
            "description": "Creator-first talent management agency connecting premium brands with diverse, multicultural, and cross-cultural influencer talent.",
            "sameAs": [
              "https://www.instagram.com/weardmgmt",
              "https://www.tiktok.com/@weardmgmt",
              "https://www.linkedin.com/company/weardmgmt"
            ]
          },
          {
            "@type": "WebSite",
            "name": "WEARD Management",
            "url": "https://weardmgmt.com/",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://weardmgmt.com/roster?search={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>

  <body class="min-h-screen bg-white text-neutral-900">
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
